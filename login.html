<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BC Combustibles</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="tarjeta" style="width: 100%; max-width: 400px;">
        
        <div style="text-align: center; margin-bottom: 15px;">
            <img src="https://bjhykcdhafoqpfkpngvw.supabase.co/storage/v1/object/public/remitos/Logo.jpeg" alt="Logo BC Combustibles" style="height: 90px; border-radius: 50%; border: 3px solid #C8102E; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
        </div>

        <h3 style="text-align: center; margin-top: 0;">Portal Clientes</h3>
        <form id="form-login">
            <div class="grupo-input" style="margin-bottom: 15px;">
                <label>Email</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>
            <div class="grupo-input" style="margin-bottom: 20px;">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="******" required>
            </div>
            <button type="submit" class="btn-rojo">Entrar al Portal</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://bjhykcdhafoqpfkpngvw.supabase.co';
        const supabaseKey = 'sb_publishable_OvXN3LjawazkF5GNpsslUQ_SQOhTakr';
        const supabaseCliente = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página parpadee
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Le tocamos la puerta a Supabase
            const { data, error } = await supabaseCliente.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Error: Usuario o contraseña incorrectos. Revisá bien.");
            } else {
                // ¡Login exitoso! Le abrimos la puerta al portal
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
